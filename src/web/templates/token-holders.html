<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Richer 交易系统 - 代币持有者信息</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="/static/css/light-theme.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <style>
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-dev { background: #f97316; color: white; }
        .badge-pump_group { background: #ec4899; color: white; }
        .badge-negative_holder { background: #6b7280; color: white; }
        .badge-hot { background: #ef4444; color: white; }
        .badge-long { background: #22c55e; color: white; }
        .badge-test { background: #3b82f6; color: white; }
        .badge-good_holder { background: #10b981; color: white; }
        .badge-none { background: #e5e7eb; color: #6b7280; }

        /* 强制表格使用白色背景 */
        #snapshots-container table,
        #snapshots-container thead,
        #snapshots-container tbody,
        #snapshots-container tr,
        #snapshots-container th,
        #snapshots-container td {
            background-color: #ffffff !important;
            color: #111827 !important;
        }
        #snapshots-container thead tr {
            background-color: #f9fafb !important;
        }
        #snapshots-container tbody tr {
            background-color: #ffffff !important;
        }
    </style>
</head>
<body class="bg-white text-gray-900">
    <div class="min-h-screen">
        <!-- 导航栏 -->
        <nav class="bg-white border-b border-gray-200">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-16">
                    <div class="flex items-center">
                        <div class="block">
                            <a href="/experiments" class="px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-gray-900 hover:bg-gray-100 transition-colors">
                                实验监控
                            </a>
                            <a href="/wallets" class="ml-2 px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-gray-900 hover:bg-gray-100 transition-colors">
                                钱包管理
                            </a>
                            <a href="/wallet-analysis" class="ml-2 px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-gray-900 hover:bg-gray-100 transition-colors">
                                钱包分析
                            </a>
                            <a href="/token-holders" class="ml-2 px-3 py-2 rounded-md text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 transition-colors">
                                代币持有者
                            </a>
                            <a href="/narrative-analyzer" class="ml-2 px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-gray-900 hover:bg-gray-100 transition-colors">
                                叙事分析
                            </a>
                            <a href="/narrative-tasks" class="ml-2 px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-gray-900 hover:bg-gray-100 transition-colors">
                                叙事任务
                            </a>
                            <a href="/monitor" class="ml-2 px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-gray-900 hover:bg-gray-100 transition-colors">
                                事件监控
                            </a>
                            <a href="/create-experiment" class="ml-2 px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-gray-900 hover:bg-gray-100 transition-colors">
                                创建实验
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <!-- 主内容区 -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <!-- 页面标题 -->
            <div class="mb-6">
                <h1 class="text-3xl font-bold text-gray-900">代币持有者信息</h1>
                <p class="text-gray-600 mt-2">查询代币持有者分布和黑名单检测</p>
            </div>

            <!-- 实验信息区域（当从实验页面链接过来时显示） -->
            <div id="experiment-info" class="hidden bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6">
                <div class="flex items-center justify-between">
                    <div>
                        <h3 class="text-sm font-medium text-blue-800">当前实验</h3>
                        <p id="experiment-name" class="text-blue-600 mt-1">--</p>
                    </div>
                    <a href="/experiments" class="text-blue-600 hover:text-blue-800 text-sm">
                        ← 返回实验列表
                    </a>
                </div>
            </div>

            <!-- 搜索区 -->
            <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 mb-6">
                <div class="flex gap-4 items-center">
                    <div class="flex-1">
                        <label class="block text-sm font-medium text-gray-700 mb-2">代币地址</label>
                        <input type="text" id="token-search" placeholder="输入代币地址 (0x...)"
                               class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm font-medium text-gray-700 mb-2">或选择代币</label>
                        <select id="token-select" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">选择代币...</option>
                        </select>
                    </div>
                    <div class="flex items-end">
                        <button id="search-btn" class="px-6 py-2 bg-blue-600 hover:bg-blue-700 rounded-md text-sm font-medium text-white transition-colors">
                            🔍 查询
                        </button>
                    </div>
                </div>
            </div>

            <!-- 加载状态 -->
            <div id="loading" class="hidden">
                <div class="flex justify-center items-center py-12">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                </div>
                <p class="text-center text-gray-600">查询中...</p>
            </div>

            <!-- 错误消息 -->
            <div id="error-message" class="hidden mb-6 bg-red-50 border border-red-200 rounded-lg p-4">
                <p class="text-red-800 font-medium">错误</p>
                <p id="error-text" class="text-red-700 mt-1"></p>
            </div>

            <!-- 结果区域 -->
            <div id="results-content" class="hidden">
                <!-- 代币信息 -->
                <div id="token-info" class="bg-white rounded-lg shadow-sm border border-gray-200 p-4 mb-6">
                    <!-- 动态填充 -->
                </div>

                <!-- 统计信息 -->
                <div id="stats-info" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                    <!-- 动态填充 -->
                </div>

                <!-- 快照列表 -->
                <div id="snapshots-container">
                    <!-- 动态填充 -->
                </div>
            </div>

            <!-- 空状态 -->
            <div id="empty-state" class="text-center py-12">
                <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <h3 class="mt-2 text-sm font-medium text-gray-900">输入代币地址查询持有者信息</h3>
                <p class="mt-1 text-sm text-gray-500">支持查询该代币的所有持有者快照记录</p>
            </div>
        </main>
    </div>

    <script src="/static/js/token-holders.js"></script>
</body>
</html>
