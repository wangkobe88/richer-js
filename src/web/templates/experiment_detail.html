<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实验详情 - Richer-js Fourmeme Trading</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="/static/css/light-theme.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <link href="/static/css/main.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <style>
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-size: 1.2rem;
            background: rgba(0,0,0,0.9);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f4f6;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .chart-container {
            position: relative;
            height: 400px;
            background: #1f2937;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body class="bg-white text-gray-900 force-light">
    <div class="min-h-screen">
        <!-- 导航栏 -->
        <nav class="bg-gray-800 border-b border-gray-700">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-16">
                    <div class="flex items-center">
                        <h1 class="text-xl font-bold text-green-400">
                            <a href="/" class="hover:text-green-300 transition-colors">
                                Richer-js Fourmeme Trading
                            </a>
                        </h1>
                        <div class="hidden md:block">
                            <a href="/experiments" class="ml-8 px-3 py-2 rounded-md text-sm font-medium text-gray-300 hover:text-white hover:bg-gray-700 transition-colors">
                                实验列表
                            </a>
                            <a href="#" id="current-page" class="ml-4 px-3 py-2 rounded-md text-sm font-medium bg-gray-700 text-white">
                                实验详情
                            </a>
                        </div>
                    </div>
                    <div class="flex items-center space-x-4">
                        <button id="refresh-btn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-md text-sm font-medium text-white transition-colors">
                            🔄 刷新
                        </button>
                        <button id="auto-refresh-btn" class="px-4 py-2 bg-green-600 hover:bg-green-700 rounded-md text-sm font-medium text-white transition-colors">
                            ⏰ 自动刷新: 开启
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- 主内容区 -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <!-- 加载指示器 -->
            <div id="loading" class="loading">
                <div class="loading-spinner"></div>
                <span class="ml-4 text-white">正在加载实验详情...</span>
            </div>

            <!-- 错误信息 -->
            <div id="error-message" class="hidden bg-red-900 border border-red-700 text-red-200 px-4 py-3 rounded-lg mb-6">
                <div class="flex items-center">
                    <span class="text-red-400">⚠️</span>
                    <span class="ml-2" id="error-text">加载失败</span>
                    <button id="retry-btn" class="ml-4 px-3 py-1 bg-red-700 hover:bg-red-600 rounded text-sm">
                        重试
                    </button>
                </div>
            </div>

            <!-- 实验详情内容 -->
            <div id="experiment-content" class="hidden">
                <!-- 实验头部信息 -->
                <div class="bg-gray-800 rounded-lg p-6 mb-8 border border-gray-700">
                    <div class="flex items-center justify-between mb-4">
                        <div>
                            <h1 class="text-3xl font-bold text-white mb-2" id="experiment-name">实验名称</h1>
                            <div class="flex items-center space-x-4">
                                <span class="px-3 py-1 rounded-full text-xs font-medium" id="experiment-status">状态</span>
                                <span class="px-3 py-1 rounded-full text-xs font-medium bg-blue-100 text-blue-700" id="experiment-type-badge">类型</span>
                                <span class="text-sm text-gray-500" id="experiment-id">ID: --</span>
                                <span class="text-sm text-gray-500" id="experiment-blockchain">区块链: --</span>
                                <span class="text-sm text-gray-500" id="experiment-strategy">策略: --</span>
                                <span class="text-sm text-gray-500 hidden" id="source-experiment-info">源实验: <a href="#" id="source-experiment-link" class="text-blue-600 hover:text-blue-800 underline">--</a></span>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-sm text-gray-500">运行时间</div>
                            <div class="text-xl font-semibold text-white" id="experiment-duration">--:--</div>
                        </div>
                    </div>

                    <!-- 快速操作导航链接 -->
                    <div class="mt-6 flex justify-center space-x-4">
                        <a id="link-signals" href="#" class="px-4 py-2 bg-purple-600 hover:bg-purple-700 rounded-md text-sm font-medium text-white transition-colors">
                            📈 查看信号
                        </a>
                        <a id="link-tokens" href="#" class="px-4 py-2 bg-teal-600 hover:bg-teal-700 rounded-md text-sm font-medium text-white transition-colors">
                            🔍 实验代币
                        </a>
                        <a id="link-trades" href="#" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 rounded-md text-sm font-medium text-white transition-colors">
                            💰 查看交易
                        </a>
                        <a id="link-observer" href="#" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 rounded-md text-sm font-medium text-white transition-colors">
                            📊 时序数据
                        </a>
                        <a id="link-returns" href="#" class="px-4 py-2 bg-orange-600 hover:bg-orange-700 rounded-md text-sm font-medium text-white transition-colors">
                            💹 收益汇总
                        </a>
                    </div>
                </div>

                <!-- 关键指标统计 -->
                <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
                    <div class="bg-white rounded-lg p-4 border border-gray-200 shadow-sm">
                        <div class="flex flex-col">
                            <p class="text-xs font-medium text-gray-600 mb-1">总收益率</p>
                            <p class="text-xl font-bold text-green-600" id="total-return">+0.00%</p>
                        </div>
                    </div>
                    <div class="bg-white rounded-lg p-4 border border-gray-200 shadow-sm">
                        <div class="flex flex-col">
                            <p class="text-xs font-medium text-gray-600 mb-1">当前价值</p>
                            <p class="text-xl font-bold text-blue-600" id="current-value">$0.00</p>
                        </div>
                    </div>
                    <div class="bg-white rounded-lg p-4 border border-gray-200 shadow-sm">
                        <div class="flex flex-col">
                            <p class="text-xs font-medium text-gray-600 mb-1">交易次数</p>
                            <p class="text-xl font-bold text-purple-600" id="total-trades">0</p>
                        </div>
                    </div>
                    <div class="bg-white rounded-lg p-4 border border-gray-200 shadow-sm">
                        <div class="flex flex-col">
                            <p class="text-xs font-medium text-gray-600 mb-1">主币余额</p>
                            <p class="text-xl font-bold text-orange-600" id="native-balance">0</p>
                        </div>
                    </div>
                    <div class="bg-white rounded-lg p-4 border border-gray-200 shadow-sm">
                        <div class="flex flex-col">
                            <p class="text-xs font-medium text-gray-600 mb-1">更新时间</p>
                            <p class="text-sm font-medium text-gray-700" id="last-update-time">--:--</p>
                        </div>
                    </div>
                </div>

                <!-- 投资组合价值图表 -->
                <div class="space-y-8 mb-8">
                    <!-- 主币余额图表 -->
                    <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
                        <h2 class="text-xl font-semibold text-white mb-4">主币余额变化</h2>
                        <div class="chart-container">
                            <canvas id="native-balance-chart"></canvas>
                        </div>
                    </div>

                    <!-- 代币市值图表 -->
                    <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
                        <h2 class="text-xl font-semibold text-white mb-4">代币市值变化</h2>
                        <div class="chart-container">
                            <canvas id="token-value-chart"></canvas>
                        </div>
                    </div>

                    <!-- 总价值图表 -->
                    <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
                        <h2 class="text-xl font-semibold text-white mb-4">总投资组合价值变化</h2>
                        <div class="chart-container">
                            <canvas id="total-value-chart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- 交易策略 -->
                <div class="bg-white rounded-lg p-6 border border-gray-200 shadow-sm mb-8">
                    <h3 class="text-lg font-semibold text-gray-900 mb-4 flex items-center">
                        <span class="mr-2">📊</span>交易策略
                    </h3>
                    <div id="strategies-container">
                        <!-- 策略列表将通过JavaScript动态填充 -->
                    </div>
                </div>

                <!-- 实验配置 -->
                <div class="bg-white rounded-lg p-6 border border-gray-200 shadow-sm mb-8">
                    <h3 class="text-lg font-semibold text-gray-900 mb-4 flex items-center">
                        <span class="mr-2">⚙️</span>实验配置
                    </h3>
                    <div id="experiment-config">
                        <!-- 配置信息将通过JavaScript填充 -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/simple-init.js?v=4.3"></script>
    <script src="/static/js/experiment_detail.js?v=4.8"></script>
</body>
</html>
