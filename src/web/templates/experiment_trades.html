<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交易记录 - Richer-js Fourmeme Trading</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="/static/css/light-theme.css?v=4.0" rel="stylesheet">
    <link href="/static/css/style.css?v=4.0" rel="stylesheet">
    <link href="/static/css/main.css?v=4.0" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.2.1/dist/chartjs-chart-financial.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
    <style>
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-size: 1.2rem;
            background: rgba(0,0,0,0.9);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f4f6;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .trade-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .trade-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .trade-buy {
            border-left: 4px solid #10b981;
            background: rgba(16, 185, 129, 0.05);
        }

        .trade-sell {
            border-left: 4px solid #ef4444;
            background: rgba(239, 68, 68, 0.05);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .status-success {
            background-color: #10b981;
            color: white;
        }

        .status-failed {
            background-color: #ef4444;
            color: white;
        }

        .status-pending {
            background-color: #f59e0b;
            color: white;
        }

        .direction-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .direction-buy {
            background-color: #10b981;
            color: white;
        }

        .direction-sell {
            background-color: #ef4444;
            color: white;
        }

        .chart-container {
            position: relative;
            height: 400px;
            background: #1f2937;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .profit-positive {
            color: #10b981;
            font-weight: 600;
        }

        .profit-negative {
            color: #ef4444;
            font-weight: 600;
        }

        .profit-neutral {
            color: #6b7280;
            font-weight: 600;
        }

        /* 下拉框选项白色文字 */
        select option {
            background-color: #374151;
            color: white;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100">
    <div class="min-h-screen">
        <!-- 导航栏 -->
        <nav class="bg-gray-800 border-b border-gray-700">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-16">
                    <div class="flex items-center">
                        <h1 class="text-xl font-bold text-green-400">
                            <a href="/" class="hover:text-green-300 transition-colors">
                                Richer-js Fourmeme Trading
                            </a>
                        </h1>
                        <div class="hidden md:block">
                            <a href="/experiments" class="ml-8 px-3 py-2 rounded-md text-sm font-medium text-gray-300 hover:text-white hover:bg-gray-700 transition-colors">
                                实验列表
                            </a>
                            <a id="link-detail" href="#" class="ml-4 px-3 py-2 rounded-md text-sm font-medium text-gray-300 hover:text-white hover:bg-gray-700 transition-colors">
                                实验详情
                            </a>
                            <a id="link-signals" href="#" class="ml-4 px-3 py-2 rounded-md text-sm font-medium text-gray-300 hover:text-white hover:bg-gray-700 transition-colors">
                                交易信号
                            </a>
                            <a href="#" id="current-page" class="ml-4 px-3 py-2 rounded-md text-sm font-medium bg-gray-700 text-white">
                                交易记录
                            </a>
                            <a id="link-returns" href="#" class="ml-4 px-3 py-2 rounded-md text-sm font-medium text-gray-300 hover:text-white hover:bg-gray-700 transition-colors">
                                收益汇总
                            </a>
                        </div>
                    </div>
                    <div class="flex items-center space-x-4">
                        <button id="refresh-btn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-md text-sm font-medium text-white transition-colors">
                            🔄 刷新
                        </button>
                        <button id="auto-refresh-btn" class="px-4 py-2 bg-green-600 hover:bg-green-700 rounded-md text-sm font-medium text-white transition-colors">
                            ⏰ 自动刷新: 开启
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- 主内容区 -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <!-- 加载指示器 -->
            <div id="loading" class="loading">
                <div class="loading-spinner"></div>
                <span class="ml-4 text-white">正在加载交易记录...</span>
            </div>

            <!-- 错误信息 -->
            <div id="error-message" class="hidden bg-red-900 border border-red-700 text-red-200 px-4 py-3 rounded-lg mb-6">
                <div class="flex items-center">
                    <span class="text-red-400">⚠️</span>
                    <span class="ml-2" id="error-text">加载失败</span>
                    <button id="retry-btn" class="ml-4 px-3 py-1 bg-red-700 hover:bg-red-600 rounded text-sm">
                        重试
                    </button>
                </div>
            </div>

            <!-- 交易内容 -->
            <div id="trades-content" class="hidden">
                <!-- 实验信息头部 -->
                <div id="experiment-header" class="bg-gray-800 rounded-lg p-6 mb-8 border border-gray-700">
                    <div class="flex items-center justify-between">
                        <div>
                            <h1 class="text-2xl font-bold text-white mb-2" id="experiment-name">实验名称</h1>
                            <div class="flex items-center space-x-4 text-sm text-gray-500">
                                <span id="experiment-id">ID: --</span>
                                <span id="experiment-blockchain">区块链: --</span>
                                <span id="trade-count">交易数量: 0</span>
                            </div>
                        </div>
                        <div class="flex items-center space-x-6">
                            <a id="link-back" href="/experiments" class="px-4 py-2 bg-gray-600 hover:bg-gray-700 rounded-md text-sm font-medium text-white transition-colors">
                                ← 返回实验面板
                            </a>
                            <div class="text-right">
                                <div class="text-sm text-gray-500">总盈亏</div>
                                <div class="text-xl font-semibold" id="total-pnl">$0.00</div>
                            </div>
                            <div class="text-right">
                                <div class="text-sm text-gray-500">胜率</div>
                                <div class="text-xl font-semibold text-green-600" id="win-rate">0%</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 代币选择器 -->
                <div class="bg-gray-800 rounded-lg p-4 mb-8 border border-gray-700">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-4">
                            <div>
                                <label for="token-selector" class="block text-sm font-medium text-white mb-1">选择代币查看K线图和交易</label>
                                <select id="token-selector" class="px-4 py-2 bg-gray-800 border border-gray-600 rounded-md text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 shadow-sm">
                                    <option value="all">全部代币</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <!-- 代币地址信息 -->
                    <div id="token-info-container" class="hidden mt-3 bg-gray-700 rounded-lg p-3 border border-gray-600">
                        <div class="flex items-center justify-between">
                            <div class="flex-1 min-w-0">
                                <span class="text-sm text-gray-400 mr-2">代币地址:</span>
                                <code id="token-address" class="text-sm text-green-400 break-all font-mono">0x...</code>
                            </div>
                            <div class="flex items-center space-x-1">
                                <a id="gmgn-link-btn" href="#" target="_blank" class="px-3 py-1 bg-green-600 hover:bg-green-700 rounded text-sm font-medium text-white transition-colors flex items-center space-x-1">
                                    <span>🔗</span>
                                    <img src="/static/gmgn.png" alt="GMGN" class="h-4">
                                </a>
                                <button id="copy-address-btn" class="px-3 py-1 bg-blue-600 hover:bg-blue-700 rounded text-sm font-medium text-white transition-colors flex items-center space-x-1">
                                    <span>📋</span>
                                    <span>复制</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 代币盈亏信息 -->
                <div id="token-pnl-container" class="hidden mb-8">
                    <!-- 盈亏信息将通过JavaScript动态生成 -->
                </div>

                <!-- 交易统计概览 -->
                <div class="bg-gray-800 rounded-lg p-6 mb-8 border border-gray-700">
                    <h2 class="text-lg font-semibold text-white mb-4">交易统计</h2>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div class="bg-gray-700 p-4 rounded-lg border border-gray-600">
                            <div class="text-sm text-gray-400 mb-1">总交易次数</div>
                            <div class="text-2xl font-bold text-gray-100" id="total-trades">0</div>
                        </div>
                        <div class="bg-gray-700 p-4 rounded-lg border border-gray-600">
                            <div class="text-sm text-gray-400 mb-1">成功交易</div>
                            <div class="text-2xl font-bold text-green-600" id="successful-trades">0</div>
                        </div>
                        <div class="bg-gray-700 p-4 rounded-lg border border-gray-600">
                            <div class="text-sm text-gray-400 mb-1">失败交易</div>
                            <div class="text-2xl font-bold text-red-500" id="failed-trades">0</div>
                        </div>
                        <div class="bg-gray-700 p-4 rounded-lg border border-gray-600">
                            <div class="text-sm text-gray-400 mb-1">买入次数</div>
                            <div class="text-2xl font-bold text-blue-600" id="stat-buy-trades">0</div>
                        </div>
                        <div class="bg-gray-700 p-4 rounded-lg border border-gray-600">
                            <div class="text-sm text-gray-400 mb-1">卖出次数</div>
                            <div class="text-2xl font-bold text-purple-600" id="stat-sell-trades">0</div>
                        </div>
                        <div class="bg-gray-700 p-4 rounded-lg border border-gray-600">
                            <div class="text-sm text-gray-400 mb-1">平均盈利</div>
                            <div class="text-2xl font-bold text-yellow-600" id="stat-avg-profit">$0.00</div>
                        </div>
                        <div class="bg-gray-700 p-4 rounded-lg border border-gray-600">
                            <div class="text-sm text-gray-400 mb-1">最大盈利</div>
                            <div class="text-2xl font-bold text-green-600" id="stat-max-profit">$0.00</div>
                        </div>
                        <div class="bg-gray-700 p-4 rounded-lg border border-gray-600">
                            <div class="text-sm text-gray-400 mb-1">最大亏损</div>
                            <div class="text-2xl font-bold text-red-500" id="stat-max-loss">$0.00</div>
                        </div>
                    </div>
                </div>

                <!-- K线图 -->
                <div class="bg-gray-800 rounded-lg border border-gray-700 mb-4">
                    <div class="p-4 border-b border-gray-700">
                        <div class="flex items-center justify-between">
                            <h4 class="text-lg font-semibold text-gray-200">
                                <span id="trade-chart-token-symbol">代币</span> 价格K线图
                            </h4>
                            <p class="text-sm text-gray-400">
                                <span id="trade-chart-interval">1分钟</span> •
                                <span id="trade-chart-time-range">加载中...</span>
                            </p>
                        </div>
                        <div class="flex items-center space-x-2">
                            <span id="trade-chart-status" class="px-3 py-1 bg-yellow-900 text-yellow-200 rounded-full text-sm font-medium">
                                加载中
                            </span>
                        </div>
                    </div>
                    <div class="p-4" style="height: 450px;">
                        <div style="position: relative; height: 100%; width: 100%;">
                            <canvas id="trade-kline-chart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- 交易筛选 -->
                <div class="bg-gray-800 rounded-lg p-4 mb-8 border border-gray-700">
                    <div class="flex flex-wrap gap-4 items-end">
                        <div>
                            <label for="direction-filter" class="block text-sm font-medium text-gray-300 mb-2">交易方向</label>
                            <select id="direction-filter" class="px-3 py-2 bg-gray-700 border border-gray-700 rounded-md text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="all">所有方向</option>
                                <option value="BUY">买入</option>
                                <option value="SELL">卖出</option>
                            </select>
                        </div>
                        <div>
                            <label for="success-filter" class="block text-sm font-medium text-gray-300 mb-2">执行状态</label>
                            <select id="success-filter" class="px-3 py-2 bg-gray-700 border border-gray-700 rounded-md text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="all">所有状态</option>
                                <option value="true">成功</option>
                                <option value="false">失败</option>
                            </select>
                        </div>
                        <div>
                            <label for="limit" class="block text-sm font-medium text-gray-300 mb-2">显示数量</label>
                            <select id="limit" class="px-3 py-2 bg-gray-700 border border-gray-700 rounded-md text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="20">20条</option>
                                <option value="50" selected>50条</option>
                                <option value="100">100条</option>
                                <option value="200">200条</option>
                            </select>
                        </div>
                        <button id="apply-filters" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-md text-sm font-medium text-white transition-colors">
                            应用筛选
                        </button>
                        <button id="clear-filters" class="px-4 py-2 bg-gray-600 hover:bg-gray-700 rounded-md text-sm font-medium text-white transition-colors">
                            清除筛选
                        </button>
                    </div>
                </div>

                <!-- 交易列表 -->
                <div class="bg-gray-800 rounded-lg border border-gray-700">
                    <div class="p-4 border-b border-gray-700 flex items-center justify-between">
                        <h2 class="text-lg font-semibold text-white">交易历史</h2>
                        <div class="flex items-center space-x-2">
                            <button id="export-trades" class="px-3 py-1 bg-gray-600 hover:bg-gray-700 rounded text-sm font-medium text-white transition-colors">
                                导出CSV
                            </button>
                        </div>
                    </div>
                    <div id="trades-container" class="divide-y divide-gray-700 max-h-[70vh] overflow-y-auto">
                        <!-- 交易卡片将通过JavaScript动态生成 -->
                    </div>
                </div>

                <!-- 空状态 -->
                <div id="empty-state" class="hidden text-center py-12">
                    <div class="text-gray-400 mb-4">
                        <svg class="w-24 h-24 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/>
                        </svg>
                    </div>
                    <h3 class="text-xl font-semibold text-gray-400 mb-2">暂无交易记录</h3>
                    <p class="text-gray-500">该实验尚未执行任何交易</p>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/simple-init.js?v=4.2"></script>
    <script src="/static/js/experiment_trades.js?v=4.8"></script>
</body>
</html>
