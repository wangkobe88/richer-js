<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Richer 交易系统 - 平台标签代币</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="/static/css/light-theme.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <style>
        .chain-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }
        .chain-bsc { background: #f0fdf4; color: #166534; }
        .chain-solana { background: #fef3c7; color: #92400e; }
        .chain-eth { background: #ede9fe; color: #6d28d9; }
        .chain-polygon { background: #fce7f3; color: #9d174d; }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .data-table th,
        .data-table td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
            color: #ffffff;
        }
        .data-table th {
            background: #1f2937;
            font-weight: 600;
            color: #ffffff;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .data-table tr {
            background: #111827;
        }
        .data-table tbody tr:hover {
            background: #1f2937;
        }

        .quick-btn {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .tab-btn {
            padding: 8px 16px;
            border-radius: 6px 6px 0 0;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: white;
            color: #2563eb;
            border-bottom: 2px solid #2563eb;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #9ca3af;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }

        .spinner {
            border: 3px solid #e5e7eb;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .action-btn {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            background: #f3f4f6;
            border: 1px solid #d1d5db;
            cursor: pointer;
            transition: all 0.2s;
        }
        .action-btn:hover {
            background: #e5e7eb;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div class="min-h-screen">
        <!-- 导航栏 -->
        <nav class="bg-white border-b border-gray-200">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-16">
                    <div class="flex items-center">
                        <h1 class="text-xl font-bold text-blue-600">
                            <a href="/experiments" class="hover:text-blue-700 transition-colors">
                                Richer-js Fourmeme Trading
                            </a>
                        </h1>
                        <div class="block">
                            <a href="/experiments" class="ml-8 px-3 py-2 rounded-md text-sm font-medium text-black hover:text-gray-700 hover:bg-gray-100 transition-colors">
                                实验监控
                            </a>
                            <a href="/platform-tokens" class="ml-4 px-3 py-2 rounded-md text-sm font-medium text-blue-600 bg-blue-50">
                                🏷️ 平台标签代币
                            </a>
                            <a href="/token-holders" class="ml-4 px-3 py-2 rounded-md text-sm font-medium text-black hover:text-gray-700 hover:bg-gray-100 transition-colors">
                                代币持有者
                            </a>
                        </div>
                    </div>
                    <div class="flex items-center space-x-4">
                        <a href="/wallets" class="px-4 py-2 bg-purple-600 hover:bg-purple-700 rounded-md text-sm font-medium text-white transition-colors">
                            👛 钱包
                        </a>
                        <a href="/create-experiment" class="px-4 py-2 bg-green-600 hover:bg-green-700 rounded-md text-sm font-medium text-white transition-colors">
                            ➕ 创建实验
                        </a>
                    </div>
                </div>
            </div>
        </nav>

        <!-- 主内容区 -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <!-- 页面标题 -->
            <div class="mb-6">
                <h1 class="text-2xl font-bold text-gray-900">🏷️ 平台标签代币查询</h1>
                <p class="mt-1 text-sm text-gray-500">通过平台标签快速查找热门代币</p>
            </div>

            <!-- 查询表单 -->
            <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 mb-6">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                    <!-- 平台标签选择 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">平台标签</label>
                        <select id="tag-select" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <optgroup label="🔥 热门标签">
                                <option value="hot">Hot</option>
                                <option value="new">New</option>
                                <option value="meme">Meme</option>
                                <option value="alpha">Alpha</option>
                                <option value="gold">Gold</option>
                            </optgroup>
                            <optgroup label="Fourmeme 生态">
                                <option value="fourmeme_in_new" selected>Fourmeme In New</option>
                                <option value="fourmeme_in_hot">Fourmeme In Hot</option>
                                <option value="fourmeme_in_almost">Fourmeme In Almost</option>
                            </optgroup>
                            <optgroup label="Flap 生态">
                                <option value="flap_in_new">Flap In New</option>
                                <option value="flap_in_hot">Flap In Hot</option>
                                <option value="flap_in_almost">Flap In Almost</option>
                            </optgroup>
                            <optgroup label="Pump 生态">
                                <option value="pump_in_new">Pump In New</option>
                                <option value="pump_in_hot">Pump In Hot</option>
                            </optgroup>
                            <optgroup label="Bonk 生态">
                                <option value="bonk_in_new">Bonk In New</option>
                                <option value="bonk_in_hot">Bonk In Hot</option>
                            </optgroup>
                            <optgroup label="其他">
                                <option value="sunpump_in_new">Sunpump In New</option>
                                <option value="grafun_in_new">Grafun In New</option>
                            </optgroup>
                        </select>
                    </div>

                    <!-- 区块链 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">区块链</label>
                        <select id="chain-select" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="bsc" selected>BSC</option>
                            <option value="solana">Solana</option>
                            <option value="eth">Ethereum</option>
                            <option value="polygon">Polygon</option>
                            <option value="base">Base</option>
                            <option value="arbitrum">Arbitrum</option>
                        </select>
                    </div>

                    <!-- 返回数量 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">返回数量</label>
                        <input type="number" id="limit-input" value="50" min="1" max="300" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>

                    <!-- 排序方式 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">排序方式</label>
                        <select id="orderby-select" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="created_at">创建时间</option>
                            <option value="tx_volume_u_24h">24小时交易量</option>
                            <option value="main_pair_tvl">主交易对TVL</option>
                        </select>
                    </div>
                </div>

                <!-- 快速选择按钮 -->
                <div class="flex flex-wrap gap-2 mb-4">
                    <button class="quick-btn bg-red-100 text-red-700 hover:bg-red-200" onclick="quickSelect('hot')">🔥 Hot</button>
                    <button class="quick-btn bg-blue-100 text-blue-700 hover:bg-blue-200" onclick="quickSelect('new')">🆕 New</button>
                    <button class="quick-btn bg-green-100 text-green-700 hover:bg-green-200" onclick="quickSelect('meme')">🐸 Meme</button>
                    <button class="quick-btn bg-yellow-100 text-yellow-700 hover:bg-yellow-200" onclick="quickSelect('alpha')">⭐ Alpha</button>
                    <button class="quick-btn bg-purple-100 text-purple-700 hover:bg-purple-200" onclick="quickSelect('fourmeme_in_new')">Four.meme New</button>
                    <button class="quick-btn bg-pink-100 text-pink-700 hover:bg-pink-200" onclick="quickSelect('flap_in_new')">Flap New</button>
                </div>

                <!-- 提示信息 -->
                <div class="bg-amber-50 border border-amber-200 rounded-lg p-3 mb-4">
                    <div class="flex">
                        <div class="flex-shrink-0">
                            <svg class="h-5 w-5 text-amber-400" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
                            </svg>
                        </div>
                        <div class="ml-3">
                            <p class="text-sm text-amber-700">
                                <span class="font-medium">注意：</span>
                                AVE API 的某些全局标签（如 <code>new</code>、<code>hot</code>）会返回多链混合数据，
                                <code>chain</code> 参数可能被忽略。结果中将显示各链的代币，请在"实际返回"中查看链分布。
                            </p>
                        </div>
                    </div>
                </div>

                <!-- 查询按钮 -->
                <div class="flex gap-3">
                    <button id="query-btn" onclick="queryTokens()" class="px-6 py-2 bg-blue-600 hover:bg-blue-700 rounded-md text-sm font-medium text-white transition-colors">
                        🔍 查询代币
                    </button>
                    <button onclick="exportData()" class="px-6 py-2 bg-gray-600 hover:bg-gray-700 rounded-md text-sm font-medium text-white transition-colors">
                        📥 导出数据
                    </button>
                </div>
            </div>

            <!-- 结果展示 -->
            <div class="bg-white rounded-lg shadow-sm border border-gray-200">
                <!-- 结果标签页 -->
                <div class="border-b border-gray-200 px-4">
                    <div class="flex space-x-4">
                        <button class="tab-btn active" onclick="switchTab('table')" id="tab-table">📊 表格视图</button>
                        <button class="tab-btn" onclick="switchTab('raw')" id="tab-raw">📄 裸数据</button>
                    </div>
                </div>

                <!-- 表格视图 -->
                <div id="content-table" class="p-4">
                    <div id="table-loading" class="loading hidden">
                        <div class="spinner"></div>
                        <p>正在查询数据...</p>
                    </div>
                    <div id="table-empty" class="empty-state">
                        <p>👆 选择平台标签后点击"查询代币"开始查询</p>
                    </div>
                    <div id="table-content" class="hidden">
                        <div class="overflow-x-auto bg-gray-900 rounded-lg">
                            <table class="data-table" id="tokens-table">
                                <thead>
                                    <tr>
                                        <th>图标</th>
                                        <th>代币</th>
                                        <th>名称</th>
                                        <th>链</th>
                                        <th>当前价格</th>
                                        <th>24h涨跌</th>
                                        <th>市值</th>
                                        <th>TVL</th>
                                        <th>持有者</th>
                                        <th>发行平台</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="tokens-tbody">
                                    <!-- 数据将动态加载到这里 -->
                                </tbody>
                            </table>
                        </div>
                        <div id="result-info" class="mt-4 text-sm text-gray-400 bg-gray-800 p-3 rounded-lg"></div>
                    </div>
                </div>

                <!-- 裸数据视图 -->
                <div id="content-raw" class="p-4 hidden">
                    <div id="raw-loading" class="loading hidden">
                        <div class="spinner"></div>
                        <p>正在查询数据...</p>
                    </div>
                    <div id="raw-empty" class="empty-state">
                        <p>👆 选择平台标签后点击"查询代币"开始查询</p>
                    </div>
                    <div id="raw-content" class="hidden">
                        <pre id="raw-data" class="bg-gray-900 text-green-400 p-4 rounded-lg overflow-auto max-h-96 text-xs"></pre>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/platform_tokens.js"></script>
</body>
</html>
