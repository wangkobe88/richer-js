<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代币最早交易 - Richer-js</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="/static/css/light-theme.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <style>
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #e5e7eb;
            border-top-color: #10b981;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .tab-container {
            border: 1px solid #e5e7eb;
            border-radius: 0.375rem;
            overflow: hidden;
            background: white;
        }
        .tab-header {
            display: flex;
            background: #f3f4f6;
            border-bottom: 1px solid #e5e7eb;
        }
        .tab-button {
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: #6b7280;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
        }
        .tab-button:hover {
            color: #374151;
            background: #e5e7eb;
        }
        .tab-button.active {
            color: #2563eb;
            background: white;
            border-bottom-color: #2563eb;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .table-container {
            max-height: 400px;
            overflow-y: auto;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }
        .data-table th {
            position: sticky;
            top: 0;
            background: #f9fafb;
            padding: 0.5rem 0.75rem;
            text-align: left;
            font-weight: 600;
            color: #374151;
            border-bottom: 1px solid #e5e7eb;
            white-space: nowrap;
        }
        .data-table td {
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid #f3f4f6;
            color: #1f2937;
        }
        .data-table tr:hover {
            background: #f9fafb;
        }
        .monospace {
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace;
            font-size: 0.75rem;
        }
        .text-green { color: #10b981; }
        .text-red { color: #ef4444; }
        .empty-state {
            padding: 2rem;
            text-align: center;
            color: #9ca3af;
        }
        .info-card {
            background: #f9fafb;
            border-radius: 0.5rem;
            padding: 1rem;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid #e5e7eb;
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .info-label {
            color: #6b7280;
            font-size: 0.875rem;
        }
        .info-value {
            color: #1f2937;
            font-weight: 500;
            font-size: 0.875rem;
        }
        .action-btn {
            padding: 2px 6px;
            font-size: 12px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            margin-right: 2px;
        }
        .action-btn:hover {
            opacity: 0.8;
        }
        .btn-good-holder {
            background: #10b981;
            color: white;
        }
        .btn-pump-group {
            background: #f97316;
            color: white;
        }
        .btn-delete {
            background: #ef4444;
            color: white;
        }
        .gmgn-link {
            color: #3b82f6;
            text-decoration: none;
            font-size: 11px;
            margin-left: 4px;
        }
        .gmgn-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen py-8">
    <div class="container mx-auto px-4 max-w-6xl">
        <!-- 页头 -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-bold text-gray-800">内盘代币最早交易</h1>
                    <p class="text-gray-600 mt-2">查询代币创建后的最早交易记录</p>
                </div>
                <a href="/experiments" class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded-md">
                    ← 返回
                </a>
            </div>
        </div>

        <!-- 查询表单 -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-xl font-semibold text-gray-800 mb-4">代币信息</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">代币地址</label>
                    <input type="text" id="tokenAddress" placeholder="0x..."
                           class="w-full px-3 py-2 border border-gray-300 rounded-md">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">区块链</label>
                    <select id="chain" class="w-full px-3 py-2 border border-gray-300 rounded-md">
                        <option value="bsc">BSC</option>
                        <option value="eth">ETH</option>
                        <option value="solana">Solana</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">时间窗口（分钟）</label>
                    <input type="number" id="timeWindowMinutes" value="3" min="0.5" max="60" step="0.5"
                           class="w-full px-3 py-2 border border-gray-300 rounded-md">
                </div>
                <div class="flex items-end">
                    <button onclick="queryTokenEarlyTrades()"
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md">
                        🔍 查询
                    </button>
                </div>
            </div>
            <div id="queryStatus" class="hidden mt-4"></div>
        </div>

        <!-- 结果展示区 -->
        <div id="resultContainer" class="hidden">
            <!-- 代币信息 TAB -->
            <div class="bg-white rounded-lg shadow-md mb-6">
                <div class="tab-container">
                    <div class="tab-header">
                        <button class="tab-button active" onclick="switchTab('info')">📊 代币信息</button>
                        <button class="tab-button" onclick="switchTab('trades')">📈 最早交易</button>
                    </div>

                    <!-- 代币信息内容 -->
                    <div id="tabInfo" class="tab-content active p-6">
                        <div id="tokenInfoContent"></div>
                    </div>

                    <!-- 最早交易内容 -->
                    <div id="tabTrades" class="tab-content p-6">
                        <div id="tradesContent"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentTokenInfo = null;
        let currentEarlyTrades = [];
        let walletBlacklist = new Set(); // 存储黑名单钱包地址
        let walletWhitelist = new Set(); // 存储白名单钱包地址

        // TAB 切换
        function switchTab(tab) {
            const buttons = document.querySelectorAll('.tab-button');
            const contents = document.querySelectorAll('.tab-content');

            buttons.forEach(btn => btn.classList.remove('active'));
            contents.forEach(content => content.classList.remove('active'));

            if (tab === 'info') {
                buttons[0].classList.add('active');
                document.getElementById('tabInfo').classList.add('active');
            } else {
                buttons[1].classList.add('active');
                document.getElementById('tabTrades').classList.add('active');
            }
        }

        // 转换为北京时间
        function toBeijingTime(timestamp) {
            if (!timestamp) return '-';
            const date = new Date(timestamp * 1000);
            const beijingTime = new Date(date.getTime() + 8 * 60 * 60 * 1000);
            return beijingTime.toISOString().replace('T', ' ').replace(/\.\d+Z$/, '').substring(0, 19);
        }

        // 渲染代币信息
        function renderTokenInfo(tokenInfo) {
            const { token, pairs, is_audited } = tokenInfo;
            const container = document.getElementById('tokenInfoContent');

            // 查找 main_pair
            const mainPair = token.main_pair || (pairs.length > 0 ? pairs[0].pair : '-');

            // 价格变化颜色
            const priceChange24h = parseFloat(token.price_change_24h || 0);
            const priceChangeClass = priceChange24h >= 0 ? 'text-green' : 'text-red';

            const html = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- 基本信息 -->
                    <div class="info-card">
                        <h3 class="text-lg font-semibold text-gray-800 mb-4">基本信息</h3>
                        <div class="info-row">
                            <span class="info-label">代币符号</span>
                            <span class="info-value">${token.symbol || '-'}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">代币名称</span>
                            <span class="info-value">${token.name || '-'}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">代币地址</span>
                            <span class="info-value monospace">${token.token || '-'}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">区块链</span>
                            <span class="info-value">${token.chain || '-'}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">创建时间</span>
                            <span class="info-value">${toBeijingTime(token.created_at)}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">上架时间</span>
                            <span class="info-value">${toBeijingTime(token.launch_at)}</span>
                        </div>
                    </div>

                    <!-- 价格信息 -->
                    <div class="info-card">
                        <h3 class="text-lg font-semibold text-gray-800 mb-4">价格信息</h3>
                        <div class="info-row">
                            <span class="info-label">当前价格 (USD)</span>
                            <span class="info-value">$${parseFloat(token.current_price_usd || 0).toFixed(6)}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">24h涨跌</span>
                            <span class="info-value ${priceChangeClass}">${priceChange24h}%</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">市值</span>
                            <span class="info-value">$${parseFloat(token.market_cap || 0).toLocaleString()}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">FDV</span>
                            <span class="info-value">$${parseFloat(token.fdv || 0).toLocaleString()}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">TVL</span>
                            <span class="info-value">$${parseFloat(token.tvl || 0).toLocaleString()}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">持有者数</span>
                            <span class="info-value">${token.holders || 0}</span>
                        </div>
                    </div>

                    <!-- 交易对信息 -->
                    <div class="info-card">
                        <h3 class="text-lg font-semibold text-gray-800 mb-4">交易对信息</h3>
                        <div class="info-row">
                            <span class="info-label">Main Pair</span>
                            <span class="info-value monospace">${mainPair}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">交易对数量</span>
                            <span class="info-value">${pairs.length}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">已审计</span>
                            <span class="info-value">${is_audited ? '是' : '否'}</span>
                        </div>
                    </div>

                    <!-- 其他信息 -->
                    <div class="info-card">
                        <h3 class="text-lg font-semibold text-gray-800 mb-4">其他信息</h3>
                        <div class="info-row">
                            <span class="info-label">总供应量</span>
                            <span class="info-value">${parseFloat(token.total || 0).toLocaleString()}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">锁定比例</span>
                            <span class="info-value">${token.locked_percent || '-'}%</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">24h交易量</span>
                            <span class="info-value">$${parseFloat(token.tx_volume_u_24h || 0).toLocaleString()}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">风险等级</span>
                            <span class="info-value">${token.risk_level || '-'}</span>
                        </div>
                    </div>
                </div>
            `;

            container.innerHTML = html;
        }

        // 渲染最早交易
        function renderEarlyTrades(trades, debugInfo) {
            const container = document.getElementById('tradesContent');

            if (!trades || trades.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无交易记录</div>';
                return;
            }

            // 显示调试信息
            let debugHtml = '';
            if (debugInfo) {
                const launchAtStr = debugInfo.launchAt ? toBeijingTime(debugInfo.launchAt) : '-';
                const createdAtStr = debugInfo.createdAt ? toBeijingTime(debugInfo.createdAt) : '-';
                const firstTradeStr = debugInfo.firstTradeTime ? toBeijingTime(debugInfo.firstTradeTime) : '-';
                const lastTradeStr = debugInfo.lastTradeTime ? toBeijingTime(debugInfo.lastTradeTime) : '-';

                debugHtml = `
                    <div class="mb-4 p-4 bg-yellow-50 border border-yellow-200 rounded text-sm">
                        <div class="font-semibold text-yellow-800 mb-3">⚠️ 数据范围说明</div>
                        <div class="grid grid-cols-2 gap-x-4 gap-y-1 mb-3">
                            <div>launch_at: <span class="font-medium">${launchAtStr}</span></div>
                            <div>created_at: <span class="font-medium">${createdAtStr}</span></div>
                            <div>pairId: <span class="monospace font-medium">${debugInfo.pairId || '-'}</span></div>
                            <div>总交易数: <span class="font-medium">${debugInfo.totalTrades || 0}</span></div>
                            <div class="${debugInfo.firstTradeTime && debugInfo.firstTradeTime > (debugInfo.launchAt || 0) ? 'text-red-600 font-semibold' : ''}">最早交易: <span class="font-medium">${firstTradeStr}</span></div>
                            <div>最晚交易: <span class="font-medium">${lastTradeStr}</span></div>
                        </div>
                        ${debugInfo.firstTradeTime && debugInfo.firstTradeTime > (debugInfo.launchAt || 0) ?
                            '<div class="mt-2 p-2 bg-red-100 rounded text-red-800">⚠️ API 返回的最早交易晚于代币创建时间，说明 AVE API 只保留最近一段时间的数据</div>' : ''}
                    </div>

                    ${debugInfo.pagination && debugInfo.pagination.totalPages > 1 ? `
                    <div class="mb-4 p-4 bg-purple-50 border border-purple-200 rounded text-sm">
                        <div class="font-semibold text-purple-800 mb-2">📄 分页查询详情</div>
                        <div class="mb-2 text-purple-800">共查询 <span class="font-bold">${debugInfo.pagination.totalPages}</span> 次，获取 <span class="font-bold">${debugInfo.totalTrades}</span> 条交易</div>
                        <div class="space-y-1">
                            ${debugInfo.pagination.logs.map(log => `
                                <div class="text-purple-800 text-xs">
                                    第${log.page}次: ${log.count}条, toTime=${log.toTimeFormatted}
                                    ${log.nextToTimeFormatted ? ` → 下次: ${log.nextToTimeFormatted}` : ''}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    ` : ''}

                    <div class="mb-4 p-4 bg-blue-50 border border-blue-200 rounded text-sm">
                        <div class="font-semibold text-gray-800 mb-2">🔧 getSwapTransactions 参数</div>
                        <div class="grid grid-cols-2 gap-x-4 gap-y-1 text-gray-800">
                            <div>pairId: <span class="monospace font-medium">${debugInfo.apiParams?.pairId || '-'}</span></div>
                            <div>limit: <span class="font-medium">${debugInfo.apiParams?.limit || '-'}</span></div>
                            <div>时间窗口: <span class="font-medium">${debugInfo.apiParams?.timeWindowMinutes || 3} 分钟</span></div>
                            <div>fromTime: <span class="font-medium">${debugInfo.apiParams?.fromTimeFormatted || 'null'}</span></div>
                            <div>toTime: <span class="font-medium">${debugInfo.apiParams?.toTimeFormatted || 'null'}</span></div>
                            <div>sort: <span class="font-medium">${debugInfo.apiParams?.sort || '-'}</span></div>
                        </div>
                        <div class="mt-2 text-gray-800 text-xs">
                            💡 fromTime: 代币 launch_at，toTime: launch_at + ${debugInfo.apiParams?.timeWindowMinutes || 3}分钟，获取代币创建后${debugInfo.apiParams?.timeWindowMinutes || 3}分钟内的交易
                        </div>
                        ${debugInfo.pagination && debugInfo.pagination.totalPages > 1 ? `
                        <div class="mt-2 text-purple-700 text-xs">
                            🔄 由于交易超过300条，进行了向前分页查询，每次返回300条时继续用更早的toTime查询
                        </div>
                        ` : ''}
                    </div>
                `;
            }

            // 提取交易中的唯一钱包地址
            const uniqueWallets = new Set();
            trades.forEach(tx => {
                if (tx.from_address) uniqueWallets.add(tx.from_address.toLowerCase());
                if (tx.to_address) uniqueWallets.add(tx.to_address.toLowerCase());
            });
            const walletsArray = Array.from(uniqueWallets).map(addr => ({ address: addr }));

            const html = `
                ${debugHtml}
                <div class="mb-4 text-sm text-gray-600">
                    显示 ${trades.length} 条交易记录（按时间升序），涉及 ${uniqueWallets.size} 个唯一钱包
                    ${debugInfo?.pagination && debugInfo.pagination.totalPages > 1 ?
                        `<span class="ml-2 text-purple-600">🔄 经 ${debugInfo.pagination.totalPages} 次分页查询获取</span>` : ''}
                </div>

                <!-- 批量操作区域 -->
                <div class="mb-4 p-4 bg-gray-50 border border-gray-200 rounded">
                    <div class="flex items-center justify-between mb-3">
                        <span class="font-semibold text-gray-800">批量操作</span>
                        <span class="text-sm text-gray-600">共 ${uniqueWallets.size} 个唯一钱包</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="batchAddGoodHolders()"
                                class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-md text-sm font-medium transition-colors">
                            ✨ 全部标记为好持有者
                        </button>
                        <button onclick="batchAddPumpGroup()"
                                class="px-4 py-2 bg-orange-600 hover:bg-orange-700 text-white rounded-md text-sm font-medium transition-colors">
                            ⚠️ 全部添加到流水盘黑名单
                        </button>
                    </div>
                </div>

                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>时间 (北京)</th>
                                <th>交易ID</th>
                                <th>买入钱包</th>
                                <th>卖出钱包</th>
                                <th>from</th>
                                <th>from数量</th>
                                <th>to</th>
                                <th>to数量</th>
                                <th>USD价值</th>
                                <th>区块</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${trades.map(tx => renderTradeRow(tx)).join('')}
                        </tbody>
                    </table>
                </div>
            `;

            container.innerHTML = html;
        }

        // 渲染单行交易
        function renderTradeRow(tx) {
            const fromAddr = tx.from_address || '';
            const toAddr = tx.to_address || '';

            // 判断钱包是否在黑名单/白名单中
            const fromInBlacklist = walletBlacklist.has(fromAddr.toLowerCase());
            const fromInWhitelist = walletWhitelist.has(fromAddr.toLowerCase());
            const toInBlacklist = walletBlacklist.has(toAddr.toLowerCase());
            const toInWhitelist = walletWhitelist.has(toAddr.toLowerCase());

            // 生成地址短码
            const fromShort = fromAddr ? `${fromAddr.substring(0, 8)}...` : '-';
            const toShort = toAddr ? `${toAddr.substring(0, 8)}...` : '-';

            return `
                <tr>
                    <td>${toBeijingTime(tx.time)}</td>
                    <td class="monospace" title="${tx.tx_id}">${tx.tx_id.substring(0, 10)}...</td>
                    <td class="monospace" title="${fromAddr}">
                        ${fromShort}
                        <a href="https://gmgn.ai/bsc/address/${fromAddr}" target="_blank" class="gmgn-link" title="在 GMGN 查看">GMGN</a>
                        ${fromAddr ? renderWalletActions(fromAddr, fromInBlacklist, fromInWhitelist) : ''}
                    </td>
                    <td class="monospace" title="${toAddr}">
                        ${toShort}
                        <a href="https://gmgn.ai/bsc/address/${toAddr}" target="_blank" class="gmgn-link" title="在 GMGN 查看">GMGN</a>
                        ${toAddr ? renderWalletActions(toAddr, toInBlacklist, toInWhitelist) : ''}
                    </td>
                    <td>${tx.from_token_symbol || '-'}</td>
                    <td>${tx.from_amount ? tx.from_amount.toFixed(6) : '-'}</td>
                    <td>${tx.to_token_symbol || '-'}</td>
                    <td>${tx.to_amount ? tx.to_amount.toFixed(6) : '-'}</td>
                    <td>${tx.from_usd ? '$' + tx.from_usd.toFixed(2) : '-'}</td>
                    <td>${tx.block_number || '-'}</td>
                </tr>
            `;
        }

        // 渲染钱包操作按钮
        function renderWalletActions(address, inBlacklist, inWhitelist) {
            if (inWhitelist) {
                return `<button class="action-btn btn-delete" onclick="deleteWallet('${address}')" title="从白名单删除">⚡ 取消</button>`;
            } else if (inBlacklist) {
                return `<button class="action-btn btn-delete" onclick="deleteWallet('${address}')" title="从黑名单删除">🗑️</button>`;
            } else {
                return `
                    <button class="action-btn btn-good-holder" onclick="addGoodHolder('${address}')" title="标记为好持有者">✨</button>
                    <button class="action-btn btn-pump-group" onclick="addPumpGroup('${address}')" title="添加到流水盘黑名单">⚠️</button>
                `;
            }
        }

        // 添加到好持有者白名单
        async function addGoodHolder(address) {
            try {
                const confirmed = confirm(
                    `✨ 确定要将此钱包标记为好持有者吗？\n\n` +
                    `地址: ${address}\n` +
                    `分类: good_holder\n\n` +
                    `注意：白名单钱包将跳过黑名单检测。`
                );

                if (!confirmed) return;

                const dateStr = new Date().toISOString().split('T')[0].replace(/-/g, '');
                const walletName = `好持有者-${dateStr}`;

                const response = await fetch('/api/wallets/add-single', {
                    method: 'POST',

        // 删除钱包

                    `🗑️ 确定要将此钱包从名单中删除吗？\n\n` +

                    `注意：删除后该钱包将不再被识别为黑名单/白名单钱包。`
                );

                const response = await fetch(`/api/wallets/address/${encodeURIComponent(address)}`, {

                });

                    alert(`✅ ${result.message}`);

                    walletBlacklist.delete(address.toLowerCase());

        // 批量标记为好持有者
        async function batchAddGoodHolders() {
            try {
                // 提取所有唯一钱包地址
                const uniqueWallets = new Set();
                currentEarlyTrades.forEach(tx => {
                    if (tx.from_address) uniqueWallets.add(tx.from_address.toLowerCase());
                    if (tx.to_address) uniqueWallets.add(tx.to_address.toLowerCase());
                });

                const walletsArray = Array.from(uniqueWallets).map(addr => ({ address: addr }));

                if (walletsArray.length === 0) {
                    alert('没有可添加的钱包');
                    return;
                }

                // 确认对话框
                const dateStr = new Date().toISOString().split('T')[0].replace(/-/g, '');
                const walletName = `好持有者-${dateStr}`;

                const confirmed = confirm(
                    `✨ 确定要将所有钱包标记为好持有者吗？\n\n` +
                    `钱包数量: ${walletsArray.length}\n` +
                    `钱包名称: ${walletName}\n` +
                    `分类: good_holder\n\n` +
                    `注意：白名单钱包将跳过黑名单检测。`
                );

                if (!confirmed) return;

                // 调用API
                const response = await fetch('/api/token-holders/add-good-holders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        holders: walletsArray,
                        snapshotDate: new Date().toISOString()
                    })
                });

                const result = await response.json();

                if (result.success) {
                    let message = `✅ ${result.message}\n\n钱包名称: ${result.data.walletName}`;
                    // 如果有跳过的钱包，显示详情
                    if (result.data.skipped > 0 && result.data.skippedWallets) {
                        message += `\n\n跳过的钱包 (${result.data.skipped} 个):\n`;
                        result.data.skippedWallets.slice(0, 10).forEach(w => {
                            message += `  - ${w.address.substring(0, 10)}...${w.address.substring(w.address.length - 6)}\n`;
                        });
                        if (result.data.skippedWallets.length > 10) {
                            message += `  ... 还有 ${result.data.skippedWallets.length - 10} 个\n`;
                        }
                    }
                    alert(message);
                    // 重新加载钱包列表
                    await loadWalletLists();
                    // 重新渲染表格
                    renderEarlyTrades(currentEarlyTrades, null);
                } else {
                    alert(`❌ 添加失败: ${result.error}`);
                }
            } catch (error) {
                console.error('批量添加好持有者失败:', error);
                alert(`❌ 添加失败: ${error.message}`);
            }
        }

        // 显示加载状态
        function showLoading() {
            const status = document.getElementById('queryStatus');
            status.className = 'mt-4 text-center';
            status.innerHTML = '<span class="loading"></span> 查询中...';
            status.classList.remove('hidden');
        }

        // 显示错误
        function showError(message) {
            const status = document.getElementById('queryStatus');
            status.className = 'mt-4 bg-red-50 border border-red-200 rounded-lg p-4 text-red-800';
            status.textContent = '❌ ' + message;
            status.classList.remove('hidden');
        }

        // 加载钱包黑名单/白名单
        async function loadWalletLists() {
            try {
                const response = await fetch('/api/wallets');
                const result = await response.json();

                if (result.success) {
                    // 清空现有列表
                    walletBlacklist.clear();
                    walletWhitelist.clear();

                    // 分类存储钱包地址
                    result.data.forEach(wallet => {
                        const address = wallet.address.toLowerCase();
                        if (wallet.category === 'good_holder') {
                            walletWhitelist.add(address);
                        } else if (wallet.category === 'pump_group' || wallet.category === 'dev' || wallet.category === 'negative_holder') {
                            walletBlacklist.add(address);
                        }
                    });

                    console.log(`✅ 已加载钱包列表: 黑名单 ${walletBlacklist.size} 个, 白名单 ${walletWhitelist.size} 个`);
                }
            } catch (error) {
                console.error('加载钱包列表失败:', error);
                // 不阻断查询流程，只是无法显示正确的按钮状态
            }
        }

        // 从 URL 获取参数
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                token: params.get('token'),
                chain: params.get('chain')
            };
        }

        // 查询代币最早交易
        async function queryTokenEarlyTrades() {
            const tokenAddress = document.getElementById('tokenAddress').value.trim();
            const chain = document.getElementById('chain').value;
            const timeWindowMinutes = parseInt(document.getElementById('timeWindowMinutes').value) || 3;

            if (!tokenAddress) {
                showError('请输入代币地址');
                return;
            }

            showLoading();
            document.getElementById('resultContainer').classList.add('hidden');

            try {
                // 先加载钱包黑名单/白名单
                await loadWalletLists();

                const response = await fetch('/api/token-early-trades', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tokenAddress, chain, timeWindowMinutes })
                });

                const result = await response.json();

                if (!result.success) {
                    showError(result.error || '查询失败');
                    return;
                }

                currentTokenInfo = result.data.tokenInfo;
                currentEarlyTrades = result.data.earlyTrades || [];
                const debugInfo = result.data.debug || null;

                // 渲染代币信息
                renderTokenInfo(currentTokenInfo);

                // 渲染最早交易
                renderEarlyTrades(currentEarlyTrades, debugInfo);

                // 显示结果
                document.getElementById('resultContainer').classList.remove('hidden');
                document.getElementById('queryStatus').classList.add('hidden');

                // 默认显示代币信息 tab
                switchTab('info');

            } catch (error) {
                showError(error.message);
            }
        }

        // 页面加载时检查 URL 参数
        window.addEventListener('DOMContentLoaded', async () => {
            const params = getUrlParams();

            if (params.token) {
                // 设置表单值
                document.getElementById('tokenAddress').value = params.token;
                if (params.chain) {
                    document.getElementById('chain').value = params.chain;
                }

                // 自动执行查询
                await queryTokenEarlyTrades();
            }
        });
    </script>
