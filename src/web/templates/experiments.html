<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实验监控 - Richer-js Fourmeme Trading</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="/static/css/light-theme.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <link href="/static/css/main.css" rel="stylesheet">
    <style>
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
            font-size: 1.2rem;
            background: #111827;
            color: #e5e7eb;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #374151;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 下拉框选项白色文字 */
        select option {
            background-color: #374151;
            color: white;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100">
    <div class="min-h-screen">
        <!-- 导航栏 -->
        <nav class="bg-gray-800 border-b border-gray-700">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-14">
                    <div class="flex items-center space-x-1.5">
                        <a href="/experiments" class="px-2 py-1.5 rounded-md text-xs font-medium text-blue-400 bg-gray-700">
                            实验监控
                        </a>
                        <a href="/platform-tokens" target="_blank" class="px-2 py-1.5 rounded-md text-xs font-medium text-gray-400 hover:text-gray-200 hover:bg-gray-700 transition-colors">
                            平台代币
                        </a>
                        <a href="/token-early-trades" target="_blank" class="px-2 py-1.5 rounded-md text-xs font-medium text-gray-400 hover:text-gray-200 hover:bg-gray-700 transition-colors">
                            最早交易
                        </a>
                        <a href="/token-holders" target="_blank" class="px-2 py-1.5 rounded-md text-xs font-medium text-gray-400 hover:text-gray-200 hover:bg-gray-700 transition-colors">
                            持有者
                        </a>
                    </div>
                    <div class="flex items-center space-x-1.5">
                        <a href="/ave-tx-test" target="_blank" class="px-2 py-1.5 rounded-md text-xs font-medium text-gray-400 hover:text-gray-200 hover:bg-gray-700 transition-colors">
                            API测试
                        </a>
                        <a href="/wallets" target="_blank" class="px-2 py-1.5 bg-purple-600 hover:bg-purple-700 rounded-md text-xs font-medium text-white transition-colors">
                            钱包
                        </a>
                        <a href="/wallet-analysis" target="_blank" class="px-2 py-1.5 rounded-md text-xs font-medium text-gray-400 hover:text-gray-200 hover:bg-gray-700 transition-colors">
                            钱包分析
                        </a>
                        <a href="/wallet-ave-query" target="_blank" class="px-2 py-1.5 rounded-md text-xs font-medium text-gray-400 hover:text-gray-200 hover:bg-gray-700 transition-colors">
                            AVE查询
                        </a>
                        <a href="/create-experiment" target="_blank" class="px-2 py-1.5 bg-green-600 hover:bg-green-700 rounded-md text-xs font-medium text-white transition-colors">
                            创建实验
                        </a>
                        <button id="refresh-btn" class="px-2 py-1.5 bg-blue-600 hover:bg-blue-700 rounded-md text-xs font-medium text-white transition-colors">
                            刷新
                        </button>
                        <button id="analyze-btn" class="px-2 py-1.5 bg-purple-600 hover:bg-purple-700 rounded-md text-xs font-medium text-white transition-colors">
                            分析
                        </button>
                        <button id="clear-all-btn" class="px-2 py-1.5 bg-red-600 hover:bg-red-700 rounded-md text-xs font-medium text-white transition-colors">
                            清空
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- 主内容区 -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-2">
            <!-- 统计信息 -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                <div class="bg-gray-800 rounded-lg p-3 border border-gray-700">
                    <div class="flex items-center justify-between">
                        <h3 class="text-sm font-medium text-gray-400">总实验数</h3>
                        <span id="total-experiments" class="text-xl font-bold text-blue-400">0</span>
                    </div>
                </div>
                <div class="bg-gray-800 rounded-lg p-3 border border-gray-700">
                    <div class="flex items-center justify-between">
                        <h3 class="text-sm font-medium text-gray-400">运行中</h3>
                        <span id="running-experiments" class="text-xl font-bold text-green-400">0</span>
                    </div>
                </div>
                <div class="bg-gray-800 rounded-lg p-3 border border-gray-700">
                    <div class="flex items-center justify-between">
                        <h3 class="text-sm font-medium text-gray-400">总交易数</h3>
                        <span id="total-trades" class="text-xl font-bold text-purple-400">0</span>
                    </div>
                </div>
                <div class="bg-gray-800 rounded-lg p-3 border border-gray-700">
                    <div class="flex items-center justify-between">
                        <h3 class="text-sm font-medium text-gray-400">最后更新</h3>
                        <span id="last-update" class="text-sm font-medium text-gray-300">--:--</span>
                    </div>
                </div>
            </div>

            <!-- 筛选控件 -->
            <div class="bg-gray-800 rounded-lg p-3 mb-4 border border-gray-700">
                <div class="flex flex-wrap gap-3 items-center">
                    <div class="flex items-center gap-2">
                        <label for="blockchain-filter" class="text-sm font-medium text-gray-300 whitespace-nowrap">区块链:</label>
                        <select id="blockchain-filter" class="px-2 py-1 bg-gray-700 border border-gray-600 rounded text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="all">所有区块链</option>
                            <option value="bsc" selected>BSC</option>
                            <option value="base">Base</option>
                            <option value="solana">Solana</option>
                        </select>
                    </div>
                    <div class="flex items-center gap-2">
                        <label for="status-filter" class="text-sm font-medium text-gray-300 whitespace-nowrap">状态:</label>
                        <select id="status-filter" class="px-2 py-1 bg-gray-700 border border-gray-600 rounded text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="all">所有状态</option>
                            <option value="initializing">未启动</option>
                            <option value="running">运行中</option>
                            <option value="stopped">已停止</option>
                            <option value="completed">已完成</option>
                            <option value="failed">失败</option>
                        </select>
                    </div>
                    <div class="flex items-center gap-2">
                        <label for="mode-filter" class="text-sm font-medium text-gray-300 whitespace-nowrap">模式:</label>
                        <select id="mode-filter" class="px-2 py-1 bg-gray-700 border border-gray-600 rounded text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="all">所有模式</option>
                            <option value="virtual">虚拟交易</option>
                            <option value="live">实盘交易</option>
                            <option value="backtest">回测</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- 加载指示器 -->
            <div id="loading" class="loading">
                <div class="loading-spinner"></div>
                <span class="ml-4 text-white">正在加载实验数据...</span>
            </div>

            <!-- 错误信息 -->
            <div id="error-message" class="hidden bg-red-900 border border-red-700 text-red-200 px-4 py-3 rounded-lg mb-6">
                <div class="flex items-center">
                    <span class="text-red-400">⚠️</span>
                    <span class="ml-2" id="error-text">加载失败</span>
                    <button id="retry-btn" class="ml-4 px-3 py-1 bg-red-700 hover:bg-red-600 text-white rounded text-xs">
                        重试
                    </button>
                </div>
            </div>

            <!-- 实验列表 -->
            <div id="experiments-container" class="bg-gray-800 rounded-lg border border-gray-700">
                <div class="overflow-x-auto">
                    <table class="w-full divide-y divide-gray-700 text-xs" style="table-layout: auto;">
                        <thead class="bg-gray-700 sticky top-0 z-10">
                            <tr>
                                <th class="px-2 py-2 text-left text-xs font-medium text-gray-300 uppercase">实验名称</th>
                                <th class="px-2 py-2 text-center text-xs font-medium text-gray-300 uppercase" style="width: 75px;">状态</th>
                                <th class="px-2 py-2 text-center text-xs font-medium text-gray-300 uppercase" style="width: 70px;">模式</th>
                                <th class="px-2 py-2 text-center text-xs font-medium text-gray-300 uppercase" style="width: 55px;">链</th>
                                <th class="px-2 py-2 text-right text-xs font-medium text-gray-300 uppercase" style="width: 60px;">时长</th>
                                <th class="px-2 py-2 text-left text-xs font-medium text-gray-300 uppercase" style="width: 140px;">开始时间</th>
                                <th class="px-2 py-2 text-left text-xs font-medium text-gray-300 uppercase" style="width: 140px;">结束时间</th>
                                <th class="px-2 py-2 text-right text-xs font-medium text-gray-300 uppercase" style="width: 55px;">代币</th>
                                <th class="px-2 py-2 text-right text-xs font-medium text-gray-300 uppercase" style="width: 60px;">胜率</th>
                                <th class="px-2 py-2 text-right text-xs font-medium text-gray-300 uppercase" style="width: 70px;">收益率</th>
                                <th class="px-2 py-2 text-right text-xs font-medium text-gray-300 uppercase" style="width: 70px;">BNB变化</th>
                                <th class="px-2 py-2 text-left text-xs font-medium text-gray-300 uppercase" style="width: 120px;">源实验</th>
                                <th class="px-2 py-2 text-center text-xs font-medium text-gray-300 uppercase" style="width: 200px;">操作</th>
                            </tr>
                        </thead>
                        <tbody id="experiments-table-body" class="bg-gray-800 divide-y divide-gray-700">
                            <!-- 实验行将通过JavaScript动态生成 -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 空状态 -->
            <div id="empty-state" class="hidden text-center py-12">
                <div class="text-gray-500 mb-4">
                    <svg class="w-24 h-24 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2V6a2 2 0 00-2-2h-2.5a2 2 0 00-2 2V9a2 2 0 002 2v2m-6 9l3 3m0 0l-3-3m3 6V4a2 2 0 002-2h2.5a2 2 0 002-2V4a2 2 0 00-2-2h-2.5a2 2 0 00-2 2v9a2 2 0 002 2z"/>
                    </svg>
                </div>
                <h3 class="text-xl font-semibold text-gray-400 mb-2">暂无实验数据</h3>
                <p class="text-gray-500">创建第一个实验开始监控</p>
            </div>
        </main>
    </div>

    <!-- 编辑实验名字模态框 -->
    <div id="edit-name-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center">
        <div class="bg-gray-800 rounded-lg shadow-xl max-w-md w-full mx-4 border border-gray-700">
            <div class="p-6">
                <h3 class="text-lg font-semibold text-white mb-4">✏️ 编辑实验名字</h3>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-300 mb-2">实验名字</label>
                    <input type="text" id="experiment-name-input" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-md text-white focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入实验名字" maxlength="100">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-300 mb-2">实验ID</label>
                    <div id="experiment-id-display" class="text-sm text-gray-400 font-mono bg-gray-900 px-3 py-2 rounded-md"></div>
                </div>
                <div class="flex justify-end space-x-3">
                    <button id="cancel-edit-btn" class="px-4 py-2 bg-gray-600 hover:bg-gray-500 rounded-md text-sm font-medium text-white transition-colors">
                        取消
                    </button>
                    <button id="save-name-btn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-md text-sm font-medium text-white transition-colors">
                        保存
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/simple-init.js?v=4.6"></script>
    <script src="/static/js/experiments.js?v=7.7"></script>
</body>
</html>
